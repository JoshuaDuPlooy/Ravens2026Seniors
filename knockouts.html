<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Senior Open 2026 – Knockouts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; color: #222; }

    /* ── Top nav ── */
    nav.top-nav {
      background: #111111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: relative;
    }
    .nav-links {
      display: flex;
    }
    nav.top-nav a {
      color: #ccc;
      text-decoration: none;
      padding: 16px 28px;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.5px;
      display: block;
      transition: background 0.2s, color 0.2s;
    }
    nav.top-nav a:hover { background: #1a1a1a; color: #fff; }
    nav.top-nav a.active { background: #2EB4EA; color: #000; }

    /* Hamburger button */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 12px 8px;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: #ccc;
      border-radius: 2px;
      transition: all 0.3s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── Page header ── */
    .page-header {
      background: #2EB4EA;
      color: #000;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-top: 1px solid #1a9fd4;
    }
    .page-header img {
      height: 56px;
      width: auto;
      object-fit: contain;
    }
    .page-header-text h1 { font-size: 24px; }
    .page-header-text p { color: rgba(0,0,0,0.55); margin-top: 3px; font-size: 13px; }

    /* ── Event tabs ── */
    .event-tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #ddd;
      padding: 0 32px;
      overflow-x: auto;
    }
    .event-tabs button {
      background: none;
      border: none;
      padding: 14px 22px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: #555;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .event-tabs button:hover { color: #2EB4EA; }
    .event-tabs button.active { color: #2EB4EA; border-bottom-color: #2EB4EA; }

    /* ── Content ── */
    .content { padding: 32px; }
    .event-panel { display: none; }
    .event-panel.active { display: block; }

    .placeholder {
      background: #fff;
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 48px;
      text-align: center;
      color: #999;
      font-size: 15px;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .hamburger { display: flex; }

      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: #111111;
        z-index: 100;
        border-top: 1px solid #2a2a2a;
      }
      .nav-links.open { display: flex; }

      nav.top-nav a {
        padding: 14px 24px;
        border-bottom: 1px solid #2a2a2a;
      }

      .page-header { padding: 16px 20px; }
      .page-header img { height: 44px; }
      .page-header-text h1 { font-size: 20px; }

      .event-tabs { padding: 0 8px; }
      .event-tabs button { padding: 12px 14px; font-size: 13px; }

      .content { padding: 16px; }
    }
  </style>
</head>
<body>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <div class="nav-links" id="navLinks">
      <a href="entries.html">Entries</a>
      <a href="knockouts.html" class="active">Knockouts</a>
      <a href="schedule.html">Schedule</a>
    </div>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Page Header -->
  <div class="page-header">
    <img src="logo.png" alt="Senior Open 2026 Logo" />
    <div class="page-header-text">
      <h1>Knockouts</h1>
      <p>Senior Open 2026</p>
    </div>
  </div>

  <!-- Event Tabs -->
  <div class="event-tabs">
    <button class="active" onclick="showEvent('mens', this)">Men's Open</button>
    <button onclick="showEvent('ladies', this)">Ladies Open</button>
    <button onclick="showEvent('second', this)">2nd &amp; Below</button>
    <button onclick="showEvent('fifth', this)">5th &amp; Below</button>
  </div>

  <!-- Content -->
  <div class="content">
    <div id="panel-mens" class="event-panel active">
      <div class="placeholder">Men's Open knockout bracket will appear here</div>
    </div>
    <div id="panel-ladies" class="event-panel">
      <div class="placeholder">Ladies Open knockout bracket will appear here</div>
    </div>
    <div id="panel-second" class="event-panel">
      <div class="placeholder">2nd &amp; Below knockout bracket will appear here</div>
    </div>
    <div id="panel-fifth" class="event-panel">
      <div class="placeholder">5th &amp; Below knockout bracket will appear here</div>
    </div>
  </div>

  <script>
    function toggleMenu() {
      const nav = document.getElementById('navLinks');
      const btn = document.getElementById('hamburger');
      nav.classList.toggle('open');
      btn.classList.toggle('open');
    }

    function showEvent(id, btn) {
      document.querySelectorAll('.event-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.event-tabs button').forEach(b => b.classList.remove('active'));
      document.getElementById('panel-' + id).classList.add('active');
      btn.classList.add('active');
    }
  </script>

</body>
</html>
